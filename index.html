<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎮 ARCADE ZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a2e;--border:#2a2a4a;
  --cyan:#00f5ff;--pink:#ff006e;--yellow:#ffbe00;--green:#39ff14;--purple:#bf5af2;--orange:#ff6b00;
  --text:#e0e0ff;--dim:#7070a0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* HEADER */
header{position:relative;z-index:10;padding:18px 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(0,245,255,0.06) 0%,transparent 100%);flex-wrap:wrap;gap:10px;}
.logo{font-family:'Press Start 2P',monospace;font-size:18px;color:var(--cyan);text-shadow:0 0 20px var(--cyan),0 0 60px rgba(0,245,255,0.3);animation:logoGlow 3s ease-in-out infinite;}
@keyframes logoGlow{0%,100%{text-shadow:0 0 20px var(--cyan),0 0 60px rgba(0,245,255,.3);}50%{text-shadow:0 0 40px var(--cyan),0 0 100px rgba(0,245,255,.5);}}
.scoreboard{display:flex;gap:20px;}
.score-item{text-align:center;font-family:'Press Start 2P',monospace;font-size:9px;}
.score-label{color:var(--dim);margin-bottom:3px;}
.score-value{color:var(--yellow);font-size:13px;}

/* MAIN */
main{position:relative;z-index:10;max-width:1400px;margin:0 auto;padding:30px 20px;}
.section-title{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--pink);text-shadow:0 0 12px var(--pink);margin-bottom:24px;letter-spacing:3px;display:flex;align-items:center;gap:12px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--pink),transparent);}

/* GAME GRID */
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:50px;}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .25s ease;position:relative;}
.game-card:hover{transform:translateY(-4px);border-color:var(--cyan);box-shadow:0 8px 30px rgba(0,245,255,.2);}
.game-card:active{transform:translateY(-2px);}
.game-canvas-preview{width:100%;height:140px;display:block;}
.game-info{padding:14px;border-top:1px solid var(--border);}
.game-name{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--cyan);margin-bottom:7px;}
.game-desc{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:10px;}
.play-btn{display:inline-block;padding:7px 18px;background:transparent;border:2px solid var(--green);color:var(--green);font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;transition:all .2s;border-radius:4px;text-shadow:0 0 8px var(--green);}
.play-btn:hover,.play-btn:active{background:var(--green);color:var(--bg);box-shadow:0 0 18px var(--green);}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;margin-bottom:7px;}
.tag-action{background:rgba(255,0,110,.2);color:var(--pink);border:1px solid var(--pink);}
.tag-puzzle{background:rgba(191,90,242,.2);color:var(--purple);border:1px solid var(--purple);}
.tag-arcade{background:rgba(0,245,255,.2);color:var(--cyan);border:1px solid var(--cyan);}
.tag-classic{background:rgba(57,255,20,.2);color:var(--green);border:1px solid var(--green);}
.tag-strategy{background:rgba(255,107,0,.2);color:var(--orange);border:1px solid var(--orange);}

/* MODAL */
.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);align-items:flex-start;justify-content:center;padding:10px;overflow-y:auto;}
.modal.active{display:flex;}
.modal-inner{background:var(--surface);border:2px solid var(--cyan);border-radius:14px;width:100%;max-width:680px;box-shadow:0 0 50px rgba(0,245,255,.25);overflow:hidden;margin:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(0,245,255,.08),transparent);gap:10px;flex-wrap:wrap;}
.modal-title{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--cyan);text-shadow:0 0 12px var(--cyan);}
.modal-score{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--yellow);}
.close-btn{background:none;border:2px solid var(--pink);color:var(--pink);font-family:'Press Start 2P',monospace;font-size:9px;padding:6px 12px;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap;}
.close-btn:hover,.close-btn:active{background:var(--pink);color:var(--bg);}
.modal-game{padding:16px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.game-wrap{position:relative;width:100%;}
#gameCanvas{border:2px solid var(--border);border-radius:8px;display:block;background:#000;max-width:100%;height:auto;touch-action:none;}
.game-over-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:10;border-radius:8px;}
.game-over-overlay.show{display:flex;}
.game-over-text{font-family:'Press Start 2P',monospace;font-size:18px;color:var(--pink);text-shadow:0 0 25px var(--pink);animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
#finalScore{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--yellow);}

/* MODAL CONTROLS ROW */
.modal-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.ctrl-btn{padding:9px 18px;background:transparent;border:2px solid var(--border);color:var(--text);font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;border-radius:4px;transition:all .2s;}
.ctrl-btn:hover,.ctrl-btn:active{border-color:var(--cyan);color:var(--cyan);}
.ctrl-btn.restart{border-color:var(--yellow);color:var(--yellow);}
.ctrl-btn.restart:hover,.ctrl-btn.restart:active{background:var(--yellow);color:var(--bg);}

/* ON-SCREEN GAMEPAD */
.gamepad{display:flex;align-items:center;justify-content:space-between;width:100%;gap:12px;padding:0 4px;}
.dpad{display:grid;grid-template-areas:". up ." "left center right" ". down .";grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:4px;}
.dpad-btn{background:rgba(255,255,255,0.06);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;width:52px;height:52px;}
.dpad-btn:active,.dpad-btn.pressed{background:var(--cyan);border-color:var(--cyan);color:var(--bg);transform:scale(.92);}
.dpad-up{grid-area:up;}.dpad-down{grid-area:down;}.dpad-left{grid-area:left;}.dpad-right{grid-area:right;}
.dpad-center{grid-area:center;background:rgba(255,255,255,0.03);}
.action-btns{display:flex;flex-direction:column;gap:8px;align-items:center;}
.action-row{display:flex;gap:8px;}
.abtn{width:56px;height:56px;border-radius:50%;border:3px solid;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;transition:all .1s;user-select:none;display:flex;align-items:center;justify-content:center;font-weight:bold;}
.abtn:active,.abtn.pressed{transform:scale(.9);box-shadow:none!important;}
.abtn-a{border-color:var(--green);color:var(--green);background:rgba(57,255,20,.1);box-shadow:0 0 12px rgba(57,255,20,.3);}
.abtn-a:active,.abtn-a.pressed{background:var(--green);color:var(--bg);}
.abtn-b{border-color:var(--pink);color:var(--pink);background:rgba(255,0,110,.1);box-shadow:0 0 12px rgba(255,0,110,.3);}
.abtn-b:active,.abtn-b.pressed{background:var(--pink);color:var(--bg);}
.abtn-x{border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,.1);box-shadow:0 0 12px rgba(0,245,255,.3);}
.abtn-x:active,.abtn-x.pressed{background:var(--cyan);color:var(--bg);}
.abtn-y{border-color:var(--yellow);color:var(--yellow);background:rgba(255,190,0,.1);box-shadow:0 0 12px rgba(255,190,0,.3);}
.abtn-y:active,.abtn-y.pressed{background:var(--yellow);color:var(--bg);}
.gamepad-labels{display:flex;flex-direction:column;gap:4px;align-items:center;min-width:80px;}
.pad-label{font-size:11px;color:var(--dim);text-align:center;line-height:1.4;}
.pad-key{display:inline-block;background:var(--card);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--cyan);font-family:'Press Start 2P',monospace;font-size:8px;}

/* Special controls for specific games */
.special-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.sp-btn{padding:12px 24px;border-radius:10px;border:3px solid;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;transition:all .1s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:4px;}
.sp-btn:active{transform:scale(.94);}
.sp-btn span{font-size:22px;}
.sp-jump{border-color:var(--green);color:var(--green);background:rgba(57,255,20,.1);}
.sp-jump:active{background:var(--green);color:var(--bg);}
.sp-shoot{border-color:var(--pink);color:var(--pink);background:rgba(255,0,110,.1);}
.sp-shoot:active{background:var(--pink);color:var(--bg);}
.sp-rotate{border-color:var(--purple);color:var(--purple);background:rgba(191,90,242,.1);}
.sp-rotate:active{background:var(--purple);color:var(--bg);}
.sp-drop{border-color:var(--yellow);color:var(--yellow);background:rgba(255,190,0,.1);}
.sp-drop:active{background:var(--yellow);color:var(--bg);}

/* Particles */
.particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;animation:floatUp linear infinite;opacity:.4;}
@keyframes floatUp{from{transform:translateY(100vh);opacity:.4;}to{transform:translateY(-100px);opacity:0;}}

@media(max-width:500px){
  .logo{font-size:13px;}
  .scoreboard{gap:12px;}
  .dpad-btn{width:46px;height:46px;}
  .dpad{grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px);}
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <div class="logo">🕹 ARCADE ZONE</div>
  <div class="scoreboard">
    <div class="score-item"><div class="score-label">HIGH SCORE</div><div class="score-value" id="hsDisplay">0</div></div>
    <div class="score-item"><div class="score-label">GESPIELT</div><div class="score-value" id="gpDisplay">0</div></div>
  </div>
</header>

<main>
  <div class="section-title">>>> SPIEL AUSWÄHLEN</div>
  <div class="game-grid" id="gameGrid"></div>
</main>

<!-- MODAL -->
<div class="modal" id="gameModal">
  <div class="modal-inner">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">GAME</span>
      <span class="modal-score">SCORE: <span id="currentScore">0</span></span>
      <button class="close-btn" onclick="closeGame()">✕ EXIT</button>
    </div>
    <div class="modal-game">
      <div class="game-wrap" id="gameWrap">
        <canvas id="gameCanvas" width="560" height="400"></canvas>
        <div class="game-over-overlay" id="gameOverOverlay">
          <div class="game-over-text" id="gameOverText">GAME OVER</div>
          <div id="finalScore"></div>
          <button class="ctrl-btn restart" onclick="restartCurrent()">↺ NOCHMAL</button>
        </div>
      </div>
      <div class="modal-controls">
        <button class="ctrl-btn restart" onclick="restartCurrent()">↺ RESTART</button>
        <button class="ctrl-btn" onclick="closeGame()">✕ EXIT</button>
      </div>
      <!-- ON-SCREEN CONTROLS (dynamically inserted per game) -->
      <div id="onScreenControls"></div>
    </div>
  </div>
</div>

<script>
// ===================================================
// GLOBAL
// ===================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let currentGame = null, gameLoop = null;
let globalHS = +localStorage.getItem('hs')||0;
let gamesPlayed = +localStorage.getItem('gp')||0;
document.getElementById('hsDisplay').textContent = globalHS;
document.getElementById('gpDisplay').textContent = gamesPlayed;

const C = {bg:'#0a0a0f',cyan:'#00f5ff',pink:'#ff006e',yellow:'#ffbe00',green:'#39ff14',purple:'#bf5af2',orange:'#ff6b00',white:'#e0e0ff',dim:'#7070a0'};

// Particles
(()=>{
  const cont=document.getElementById('particles');
  const colors=[C.cyan,C.pink,C.yellow,C.green];
  for(let i=0;i<35;i++){
    const p=document.createElement('div');p.className='particle';
    p.style.cssText=`left:${Math.random()*100}%;animation-duration:${6+Math.random()*16}s;animation-delay:${Math.random()*16}s;background:${colors[i%colors.length]};width:${Math.random()>0.5?1:2}px;height:${Math.random()>0.5?1:2}px;`;
    cont.appendChild(p);
  }
})();

// ===================================================
// GAME REGISTRY
// ===================================================
const GAME_DEFS = [
  {id:'snake',   name:'SNAKE',          tag:'classic',  desc:'Friss Äpfel, wachse, weiche dir selbst aus!'},
  {id:'tetris',  name:'TETRIS',         tag:'puzzle',   desc:'Stapel Blöcke, räume Reihen, beat the score!'},
  {id:'breakout',name:'BREAKOUT',       tag:'arcade',   desc:'Zerstöre alle Blöcke mit dem Ball!'},
  {id:'invaders',name:'SPACE INVADERS', tag:'action',   desc:'Schieße Aliens ab bevor sie landen!'},
  {id:'flappy',  name:'FLAPPY BIRD',    tag:'arcade',   desc:'Klicke um zu fliegen, weiche Röhren aus!'},
  {id:'g2048',   name:'2048',           tag:'puzzle',   desc:'Merge Kacheln, erreiche 2048!'},
  {id:'dino',    name:'DINO RUNNER',    tag:'action',   desc:'Spring über Hindernisse, so weit wie möglich!'},
  {id:'pong',    name:'PONG',           tag:'classic',  desc:'Spiele gegen die KI, erster auf 7 gewinnt!'},
  {id:'memory',  name:'MEMORY',         tag:'puzzle',   desc:'Finde alle Paare so schnell wie möglich!'},
  {id:'tictac',  name:'TIC TAC TOE',    tag:'strategy', desc:'Drei in einer Reihe gegen die KI!'},
  {id:'whack',   name:'WHACK-A-MOLE',   tag:'action',   desc:'Hau die Maulwürfe so schnell du kannst!'},
  {id:'dodge',   name:'DODGE BALL',     tag:'action',   desc:'Weiche fallenden Bällen aus, so lang wie möglich!'},
  {id:'colorfall',name:'COLOR FALL',    tag:'puzzle',   desc:'Treffe farbige Ziele mit dem richtigen Block!'},
];

// Build grid
const grid = document.getElementById('gameGrid');
GAME_DEFS.forEach(g => {
  grid.innerHTML += `
  <div class="game-card" onclick="openGame('${g.id}')">
    <canvas class="game-canvas-preview" id="prev-${g.id}" width="280" height="140"></canvas>
    <div class="game-info">
      <div><span class="tag tag-${g.tag}">${g.tag.toUpperCase()}</span></div>
      <div class="game-name">${g.name}</div>
      <div class="game-desc">${g.desc}</div>
      <button class="play-btn">▶ SPIELEN</button>
    </div>
  </div>`;
});
setTimeout(drawAllPreviews, 200);

// ===================================================
// MODAL
// ===================================================
function openGame(id) {
  currentGame = id;
  gamesPlayed++; localStorage.setItem('gp', gamesPlayed);
  document.getElementById('gpDisplay').textContent = gamesPlayed;
  document.getElementById('gameModal').classList.add('active');
  document.getElementById('currentScore').textContent = '0';
  document.getElementById('gameOverOverlay').classList.remove('show');
  const def = GAME_DEFS.find(g=>g.id===id);
  document.getElementById('modalTitle').textContent = def?.name || id.toUpperCase();
  if(gameLoop){clearInterval(gameLoop);cancelAnimationFrame(gameLoop);gameLoop=null;}
  games[id]?.start();
}

function closeGame() {
  document.getElementById('gameModal').classList.remove('active');
  if(gameLoop){clearInterval(gameLoop);cancelAnimationFrame(gameLoop);gameLoop=null;}
  games[currentGame]?._cleanup?.();
  currentGame = null;
}

function restartCurrent() {
  if(!currentGame) return;
  document.getElementById('gameOverOverlay').classList.remove('show');
  document.getElementById('currentScore').textContent='0';
  if(gameLoop){clearInterval(gameLoop);cancelAnimationFrame(gameLoop);gameLoop=null;}
  games[currentGame]?._cleanup?.();
  games[currentGame]?.start();
}

function setScore(s) {
  document.getElementById('currentScore').textContent = s;
  if(s > globalHS){ globalHS=s; localStorage.setItem('hs',s); document.getElementById('hsDisplay').textContent=s; }
}

function gameOver(msg='GAME OVER') {
  document.getElementById('gameOverText').textContent = msg;
  document.getElementById('finalScore').textContent = 'SCORE: '+document.getElementById('currentScore').textContent;
  document.getElementById('gameOverOverlay').classList.add('show');
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&currentGame) closeGame(); });

// ===================================================
// ON-SCREEN CONTROL BUILDERS
// ===================================================
function buildDpad(opts={}) {
  // opts: {up,down,left,right,a,b,x,y,aLabel,bLabel,xLabel,yLabel,hideRight,hideAction}
  const osc = document.getElementById('onScreenControls');
  osc.innerHTML = '';
  const gp = document.createElement('div');
  gp.className = 'gamepad';

  // D-Pad
  const dp = document.createElement('div'); dp.className='dpad';
  const mkDpad = (area,symbol,action) => {
    const b=document.createElement('div');
    b.className=`dpad-btn dpad-${area}`; b.textContent=symbol; b.id=`dp-${area}`;
    const press=()=>{ b.classList.add('pressed'); opts[area]?.(); };
    const release=()=>b.classList.remove('pressed');
    b.addEventListener('pointerdown', e=>{ e.preventDefault(); press(); });
    b.addEventListener('pointerup', release); b.addEventListener('pointercancel', release);
    dp.appendChild(b);
  };
  mkDpad('up','▲'); mkDpad('down','▼'); mkDpad('left','◀'); mkDpad('right','▶');
  const center=document.createElement('div'); center.className='dpad-btn dpad-center'; dp.appendChild(center);
  gp.appendChild(dp);

  // Labels
  if(opts.labelText) {
    const lbl=document.createElement('div'); lbl.className='gamepad-labels';
    lbl.innerHTML=opts.labelText; gp.appendChild(lbl);
  }

  // Action buttons
  if(!opts.hideAction) {
    const ab=document.createElement('div'); ab.className='action-btns';
    const row1=document.createElement('div'); row1.className='action-row';
    const row2=document.createElement('div'); row2.className='action-row';
    const mkBtn=(cls,label,cb)=>{
      const b=document.createElement('div'); b.className=`abtn ${cls}`; b.textContent=label;
      const press=()=>{b.classList.add('pressed');cb?.();};
      const release=()=>b.classList.remove('pressed');
      b.addEventListener('pointerdown',e=>{e.preventDefault();press();});
      b.addEventListener('pointerup',release); b.addEventListener('pointercancel',release);
      return b;
    };
    if(opts.y) row1.appendChild(mkBtn('abtn-y', opts.yLabel||'Y', opts.y));
    if(opts.x) row1.appendChild(mkBtn('abtn-x', opts.xLabel||'X', opts.x));
    if(opts.b) row2.appendChild(mkBtn('abtn-b', opts.bLabel||'B', opts.b));
    if(opts.a) row2.appendChild(mkBtn('abtn-a', opts.aLabel||'A', opts.a));
    if(row1.children.length) ab.appendChild(row1);
    if(row2.children.length) ab.appendChild(row2);
    if(ab.children.length) gp.appendChild(ab);
  }

  osc.appendChild(gp);
}

function buildSpecial(buttons) {
  // buttons: [{label, icon, cls, cb}]
  const osc=document.getElementById('onScreenControls');
  osc.innerHTML='';
  const row=document.createElement('div'); row.className='special-controls';
  buttons.forEach(b=>{
    const btn=document.createElement('div');
    btn.className=`sp-btn ${b.cls}`;
    btn.innerHTML=`<span>${b.icon}</span>${b.label}`;
    btn.addEventListener('pointerdown',e=>{e.preventDefault();b.cb?.();});
    row.appendChild(btn);
  });
  osc.appendChild(row);
}

function buildClickOnly(label, icon, cls, cb) {
  const osc=document.getElementById('onScreenControls');
  osc.innerHTML='';
  const btn=document.createElement('div');
  btn.className=`sp-btn ${cls}`;
  btn.style.cssText='padding:18px 40px;font-size:14px;';
  btn.innerHTML=`<span style="font-size:36px">${icon}</span>${label}`;
  btn.addEventListener('pointerdown',e=>{e.preventDefault();cb?.();});
  osc.appendChild(btn);
}

// ===================================================
// HOLD-KEY HELPER (for games using setInterval)
// ===================================================
const heldKeys = new Set();
document.addEventListener('keydown', e=>heldKeys.add(e.key));
document.addEventListener('keyup', e=>heldKeys.delete(e.key));

// Simulated key via on-screen buttons
const virtualKeys = new Set();

function isKey(...keys) { return keys.some(k=>heldKeys.has(k)||virtualKeys.has(k)); }

function holdVKey(key) { virtualKeys.add(key); }
function releaseVKey(key) { virtualKeys.delete(key); }

function makeHoldDpad(up,dn,lt,rt) {
  // up/dn/lt/rt are key strings
  const setup=(id,key)=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.addEventListener('pointerdown',e=>{e.preventDefault();holdVKey(key);el.classList.add('pressed');});
    const rel=()=>{ releaseVKey(key); el.classList.remove('pressed'); };
    el.addEventListener('pointerup',rel); el.addEventListener('pointercancel',rel);
  };
  setup('dp-up',up); setup('dp-down',dn); setup('dp-left',lt); setup('dp-right',rt);
}

// ===================================================
// PREVIEW CANVAS DRAWINGS
// ===================================================
function drawAllPreviews() {
  prevSnake(); prevTetris(); prevBreakout(); prevInvaders(); prevFlappy(); prev2048();
  prevDino(); prevPong(); prevMemory(); prevTictac(); prevWhack(); prevDodge(); prevColorfall();
}

function pCtx(id){
  const c=document.getElementById('prev-'+id); if(!c)return null;
  const x=c.getContext('2d'); x.fillStyle='#000'; x.fillRect(0,0,c.width,c.height);
  return{ctx:x,w:c.width,h:c.height};
}

function prevSnake(){
  const p=pCtx('snake');if(!p)return;const{ctx,w,h}=p;
  ctx.fillStyle='#001a0a';ctx.fillRect(0,0,w,h);
  const s=[{x:8,y:4},{x:7,y:4},{x:6,y:4},{x:5,y:4},{x:4,y:4},{x:4,y:5},{x:4,y:6},{x:5,y:6},{x:6,y:6}],sz=14;
  s.forEach((seg,i)=>{ctx.fillStyle=i===0?C.green:`rgba(57,255,20,${1-i/s.length*.6})`;ctx.shadowColor=C.green;ctx.shadowBlur=i===0?12:4;ctx.fillRect(seg.x*sz+2,seg.y*sz+2,sz-2,sz-2);});
  ctx.fillStyle=C.pink;ctx.shadowColor=C.pink;ctx.shadowBlur=15;ctx.beginPath();ctx.arc(13*sz+sz/2,2*sz+sz/2,sz/2-1,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}

function prevTetris(){
  const p=pCtx('tetris');if(!p)return;const{ctx,w,h}=p;
  ctx.fillStyle='#000814';ctx.fillRect(0,0,w,h);
  const pieces=[{b:[[0,0],[1,0],[2,0],[3,0]],c:C.cyan,x:0,y:0},{b:[[0,0],[1,0],[0,1],[1,1]],c:C.yellow,x:5,y:0},{b:[[0,0],[1,0],[2,0],[1,1]],c:C.purple,x:10,y:0},{b:[[0,0],[1,0],[2,0],[2,1]],c:C.orange,x:0,y:3},{b:[[0,1],[1,1],[1,0],[2,0]],c:C.green,x:5,y:3}];
  const sz=16;
  pieces.forEach(p=>{p.b.forEach(([bx,by])=>{ctx.fillStyle=p.c;ctx.shadowColor=p.c;ctx.shadowBlur=6;ctx.fillRect((p.x+bx)*sz+1,(p.y+by)*sz+1,sz-2,sz-2);});});
  for(let r=6;r<9;r++)for(let c=0;c<w/sz;c++){ctx.fillStyle=c%2===r%2?'#334':'#223';ctx.shadowBlur=0;ctx.fillRect(c*sz+1,r*sz+1,sz-2,sz-2);}
  ctx.shadowBlur=0;
}

function prevBreakout(){
  const p=pCtx('breakout');if(!p)return;const{ctx,w,h}=p;

  ['#ff006e','#ff4500','#ffbe00','#39ff14','#00f5ff'].forEach((c,r)=>{
    for(let col=0;col<6;col++){if(Math.random()>.15){ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=5;ctx.fillRect(col*44+5,r*20+8,40,14);}}
  });
  ctx.fillStyle=C.white;ctx.shadowColor=C.white;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(140,110,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.cyan;ctx.shadowColor=C.cyan;ctx.shadowBlur=15;ctx.fillRect(100,132,80,10);ctx.shadowBlur=0;
}

function prevFlappy(){
  const p=pCtx('flappy');if(!p)return;const{ctx,w,h}=p;
  const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#001428');g.addColorStop(1,'#002a50');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  [[50,60],[150,45],[250,80],[360,55]].forEach(([x,gap])=>{ctx.fillStyle=C.green;ctx.shadowColor=C.green;ctx.shadowBlur=6;ctx.fillRect(x,0,28,gap);ctx.fillRect(x,gap+50,28,h);ctx.fillRect(x-3,gap-13,34,13);ctx.fillRect(x-3,gap+50,34,13);});
  ctx.fillStyle=C.yellow;ctx.shadowColor=C.yellow;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(70,75,11,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}

function prev2048(){
  const p=pCtx('2048');if(!p)return;const{ctx,w,h}=p;
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,w,h);
  const tc={2:'#3a3a5c',4:'#4a3a6c',8:'#5a2a7c',16:'#8a0aac',32:C.pink,64:'#ff4500',128:C.yellow,256:C.yellow,512:C.cyan,1024:'#00cfff',2048:'#fff'};
  const tiles=[[2,4,8,16],[32,64,128,256],[512,1024,2048,0],[4,8,16,32]];
  const sz=56,pad=7,ox=(w-4*sz-3*pad)/2,oy=(h-4*sz-3*pad)/2;
  tiles.forEach((row,r)=>row.forEach((v,c)=>{
    const x=ox+c*(sz+pad),y=oy+r*(sz+pad);
    ctx.fillStyle=v?(tc[v]||C.purple):'#0a0a2e';ctx.shadowColor=v?(tc[v]||C.purple):'transparent';ctx.shadowBlur=v?8:0;
    ctx.beginPath();ctx.roundRect(x,y,sz,sz,5);ctx.fill();
    if(v){ctx.shadowBlur=0;ctx.fillStyle=v>=8?'#fff':'#ccc';ctx.font=`bold ${v>=1000?12:v>=100?15:18}px Rajdhani`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(v,x+sz/2,y+sz/2);}
  }));ctx.shadowBlur=0;
}

function prevMemory(){
  const p=pCtx('memory');if(!p)return;const{ctx,w,h}=p;
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,w,h);
  const emojis=['🎮','🕹','👾','🚀','⭐','💎'];
  const cols=4,rows=3,sz=56;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=c*62+10,y=r*42+8;
    const revealed=(r===0&&c===0)||(r===0&&c===2)||(r===1&&c===1)||(r===1&&c===3);
    ctx.fillStyle=revealed?'#1a2a3a':'#1a1a3e';ctx.strokeStyle='#2a2a5a';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(x,y,sz,38,5);ctx.fill();ctx.stroke();
    if(revealed){ctx.font='22px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(emojis[c+r*2%emojis.length],x+sz/2,y+19);}
    else{ctx.fillStyle=C.cyan;ctx.shadowColor=C.cyan;ctx.shadowBlur=5;ctx.font='bold 18px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',x+sz/2,y+19);}
  }ctx.shadowBlur=0;
}

function prevTictac(){
  const p=pCtx('tictac');if(!p)return;const{ctx,w,h}=p;
  ctx.fillStyle='#0a001a';ctx.fillRect(0,0,w,h);
  const g=70,ox=35,oy=10;
  ctx.strokeStyle=C.purple;ctx.shadowColor=C.purple;ctx.shadowBlur=8;ctx.lineWidth=3;
  [[ox+g,oy,ox+g,oy+g*3],[ox+g*2,oy,ox+g*2,oy+g*3],[ox,oy+g,ox+g*3,oy+g],[ox,oy+g*2,ox+g*3,oy+g*2]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  const board=['X','O','X','','X','O','O','','X'];
  board.forEach((v,i)=>{
    const c=i%3,r=Math.floor(i/3),cx=ox+c*g+g/2,cy=oy+r*g+g/2;
    if(v==='X'){ctx.strokeStyle=C.cyan;ctx.shadowColor=C.cyan;ctx.shadowBlur=10;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx-20,cy-20);ctx.lineTo(cx+20,cy+20);ctx.moveTo(cx+20,cy-20);ctx.lineTo(cx-20,cy+20);ctx.stroke();}
    if(v==='O'){ctx.strokeStyle=C.pink;ctx.shadowColor=C.pink;ctx.shadowBlur=10;ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);ctx.stroke();}
  });
  ctx.shadowBlur=0;
}

function prevColorfall(){

const games = {};

// ==================== SNAKE ====================
games.snake = {
  _kd: null,
  start() {
    canvas.width=560;canvas.height=400;
    const SZ=20,COLS=28,ROWS=20;
    let snake=[{x:14,y:10},{x:13,y:10},{x:12,y:10}];
    let dir={x:1,y:0},nextDir={x:1,y:0},food={x:5,y:5},score=0,running=true;
    const placeFood=()=>{do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(s=>s.x===food.x&&s.y===food.y));};
    placeFood();

    buildDpad({
      up:()=>{if(dir.y!==1)nextDir={x:0,y:-1};},
      down:()=>{if(dir.y!==-1)nextDir={x:0,y:1};},
      left:()=>{if(dir.x!==1)nextDir={x:-1,y:0};},
      right:()=>{if(dir.x!==-1)nextDir={x:1,y:0};},
      hideAction:true,
      labelText:'<div class="pad-label">Steuern</div>'
    });

    this._kd=(e)=>{
      const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
      const d=m[e.key];if(d&&!(d.x===-dir.x&&d.y===0)&&!(d.y===-dir.y&&d.x===0))nextDir=d;
    };
    document.addEventListener('keydown',this._kd);

    const draw=()=>{
      ctx.fillStyle='#000810';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle='rgba(0,245,255,.05)';ctx.lineWidth=1;
      for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*SZ,0);ctx.lineTo(x*SZ,canvas.height);ctx.stroke();}
      for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*SZ);ctx.lineTo(canvas.width,y*SZ);ctx.stroke();}
      ctx.fillStyle=C.pink;ctx.shadowColor=C.pink;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-2,0,Math.PI*2);ctx.fill();
      snake.forEach((seg,i)=>{ctx.fillStyle=i===0?C.green:`rgba(57,255,20,${1-i/snake.length*.55})`;ctx.shadowColor=C.green;ctx.shadowBlur=i===0?14:4;ctx.fillRect(seg.x*SZ+1,seg.y*SZ+1,SZ-2,SZ-2);});
      ctx.shadowBlur=0;ctx.fillStyle=C.cyan;ctx.font='bold 12px "Press Start 2P"';ctx.textAlign='left';ctx.fillText('SCORE: '+score,10,canvas.height-8);
    };

    gameLoop=setInterval(()=>{
      if(!running)return;
      dir=nextDir;
      const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
      if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){running=false;clearInterval(gameLoop);draw();gameOver();return;}
      snake.unshift(head);
      if(head.x===food.x&&head.y===food.y){score+=10;setScore(score);placeFood();}else snake.pop();
      draw();
    },120);
  },
  _cleanup(){document.removeEventListener('keydown',this._kd);}
};

// ==================== TETRIS ====================
games.tetris = {
  _kd:null,
  start() {
    canvas.width=300;canvas.height=420;
    const SZ=20,COLS=10,ROWS=21;
    const PIECES=[
      {s:[[1,1,1,1]],c:C.cyan},{s:[[1,1],[1,1]],c:C.yellow},
      {s:[[0,1,0],[1,1,1]],c:C.purple},{s:[[1,0,0],[1,1,1]],c:C.orange},
      {s:[[0,0,1],[1,1,1]],c:'#0050ff'},{s:[[1,1,0],[0,1,1]],c:C.pink},
      {s:[[0,1,1],[1,1,0]],c:C.green}
    ];
    let board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    let score=0,piece=null,px=0,py=0,running=true;

    const newPiece=()=>{
      const p=PIECES[Math.floor(Math.random()*PIECES.length)];
      piece={shape:p.s.map(r=>[...r]),color:p.c};
      px=Math.floor(COLS/2)-Math.floor(piece.shape[0].length/2);py=0;
      if(!valid(0,0)){running=false;clearInterval(gameLoop);gameOver();}
    };
    const valid=(dx,dy,s=piece.shape)=>{
      for(let r=0;r<s.length;r++)for(let c=0;c<s[r].length;c++)
        if(s[r][c]){const nx=px+c+dx,ny=py+r+dy;if(nx<0||nx>=COLS||ny>=ROWS||ny<0||board[ny]?.[nx])return false;}
      return true;
    };
    const place=()=>{
      piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v)board[py+r][px+c]=piece.color;}));
      let cleared=0;
      for(let r=ROWS-1;r>=0;r--){if(board[r].every(v=>v)){board.splice(r,1);board.unshift(Array(COLS).fill(0));cleared++;r++;}}
      score+=[0,10,30,60,100][cleared]||0;setScore(score);newPiece();
    };
    const rotate=()=>{const rot=piece.shape[0].map((_,i)=>piece.shape.map(r=>r[i]).reverse());if(valid(0,0,rot))piece.shape=rot;};
    const drop=()=>{while(valid(0,1))py++;place();};

    buildDpad({
      left:()=>{if(valid(-1,0))px--;},
      right:()=>{if(valid(1,0))px++;},
      down:()=>{if(valid(0,1))py++;},
      up:()=>rotate(),
      a:()=>rotate(), aLabel:'↻',
      b:()=>drop(), bLabel:'DROP',
      labelText:'<div class="pad-label">←→ Bewegen</div><div class="pad-label">↑ Drehen</div><div class="pad-label">↓ Schneller</div>'
    });

    this._kd=e=>{
      if(!running)return;
      if(e.key==='ArrowLeft'&&valid(-1,0))px--;
      if(e.key==='ArrowRight'&&valid(1,0))px++;
      if(e.key==='ArrowDown'&&valid(0,1))py++;
      if(e.key==='ArrowUp')rotate();
      if(e.key===' '){e.preventDefault();drop();}
    };
    document.addEventListener('keydown',this._kd);

    const draw=()=>{
      ctx.fillStyle='#000814';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
      for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*SZ,0);ctx.lineTo(c*SZ,canvas.height);ctx.stroke();}
      for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*SZ);ctx.lineTo(canvas.width,r*SZ);ctx.stroke();}
      board.forEach((row,r)=>row.forEach((v,c)=>{if(v){ctx.fillStyle=v;ctx.shadowColor=v;ctx.shadowBlur=5;ctx.fillRect(c*SZ+1,r*SZ+1,SZ-2,SZ-2);}}));
      if(piece){
        let ghost=0;while(valid(0,ghost+1))ghost++;
        piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v){ctx.fillStyle='rgba(255,255,255,.08)';ctx.shadowBlur=0;ctx.fillRect((px+c)*SZ+1,(py+ghost+r)*SZ+1,SZ-2,SZ-2);}}));
        piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v){ctx.fillStyle=piece.color;ctx.shadowColor=piece.color;ctx.shadowBlur=8;ctx.fillRect((px+c)*SZ+1,(py+r)*SZ+1,SZ-2,SZ-2);}}));
      }
      ctx.shadowBlur=0;ctx.fillStyle=C.cyan;ctx.font='bold 11px "Press Start 2P"';ctx.textAlign='left';ctx.fillText(score,5,canvas.height-5);
    };

    newPiece();
    gameLoop=setInterval(()=>{if(!running)return;if(valid(0,1))py++;else place();draw();},500);
  },
  _cleanup(){document.removeEventListener('keydown',this._kd);}
};

// ==================== BREAKOUT ====================
games.breakout = {
  _kd:null,_ku:null,_mm:null,
  start() {
    canvas.width=560;canvas.height=400;
    const ROWS=6,COLS=10,BW=50,BH=15,PAD=4;
    const COLORS=[C.pink,'#ff4500',C.yellow,C.green,C.cyan,C.purple];
    let bricks=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)bricks.push({x:c*(BW+PAD)+8,y:r*(BH+PAD)+25,alive:true,color:COLORS[r]});

games.g2048 = {
  _kd:null,
  start() {
    canvas.width=420;canvas.height=420;
    const SZ=4;let grid=Array.from({length:SZ},()=>Array(SZ).fill(0)),score=0;
    const addTile=()=>{const emp=[];grid.forEach((r,ri)=>r.forEach((v,ci)=>{if(!v)emp.push({r:ri,c:ci});}));if(!emp.length)return;const{r,c}=emp[Math.floor(Math.random()*emp.length)];grid[r][c]=Math.random()<.9?2:4;};
    addTile();addTile();

    const slide=row=>{let arr=row.filter(v=>v);for(let i=0;i<arr.length-1;i++)if(arr[i]===arr[i+1]){arr[i]*=2;score+=arr[i];setScore(score);arr.splice(i+1,1);}while(arr.length<SZ)arr.push(0);return arr;};
    const move=dir=>{
      const prev=JSON.stringify(grid);
      if(dir==='left')grid=grid.map(r=>slide(r));
      if(dir==='right')grid=grid.map(r=>slide([...r].reverse()).reverse());
      if(dir==='up'){let t=Array.from({length:SZ},()=>Array(SZ).fill(0));for(let c=0;c<SZ;c++){let col=slide(grid.map(r=>r[c]));col.forEach((v,r)=>t[r][c]=v);}grid=t;}
      if(dir==='down'){let t=Array.from({length:SZ},()=>Array(SZ).fill(0));for(let c=0;c<SZ;c++){let col=slide(grid.map(r=>r[c]).reverse()).reverse();col.forEach((v,r)=>t[r][c]=v);}grid=t;}
      if(JSON.stringify(grid)!==prev)addTile();draw();
    };

    buildDpad({
      up:()=>move('up'),down:()=>move('down'),left:()=>move('left'),right:()=>move('right'),
      hideAction:true,labelText:'<div class="pad-label">Kacheln<br>verschieben</div>'
    });

    this._kd=e=>{const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};if(m[e.key]){e.preventDefault();move(m[e.key]);}};
    document.addEventListener('keydown',this._kd);

    // Swipe
    let tx=0,ty=0;
    canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
    canvas.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)){move(dx>0?'right':'left');}else move(dy>0?'down':'up');});

    const TC={2:'#3a3a5c',4:'#4a3a7c',8:'#6a1a9c',16:'#8a0aac',32:C.pink,64:'#ff4500',128:C.yellow,256:'#ffd700',512:C.cyan,1024:'#00c8ff',2048:'#ffffff'};
    const draw=()=>{
      ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
      const PAD=12,TILE=(canvas.width-PAD*5)/4;
      grid.forEach((row,r)=>row.forEach((v,c)=>{
        const x=PAD+c*(TILE+PAD),y=PAD+r*(TILE+PAD),col=TC[v]||C.purple;
        ctx.fillStyle=v?col:'#0a0a2e';ctx.shadowColor=v?col:'transparent';ctx.shadowBlur=v?14:0;
        ctx.beginPath();ctx.roundRect(x,y,TILE,TILE,8);ctx.fill();
        if(v){ctx.shadowBlur=0;ctx.fillStyle=v<=4?'#ccc':'#fff';const fs=v>=1000?20:v>=100?24:v>=10?28:32;ctx.font=`bold ${fs}px Rajdhani`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(v,x+TILE/2,y+TILE/2);}
      }));ctx.shadowBlur=0;
    };draw();
  },
  _cleanup(){document.removeEventListener('keydown',this._kd);}
};

      if(ball.x>canvas.width){p1.score++;ball={x:280,y:200,dx:-4.5,dy:3*(Math.random()>.5?1:-1),r:8};}
      setScore(p2.score);
      if(p1.score>=7||p2.score>=7){running=false;clearInterval(gameLoop);gameOver(p2.score>=7?'DU GEWINNST! 🎉':'AI WINS!');}
      ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.setLineDash([9,9]);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(canvas.width/2,0);ctx.lineTo(canvas.width/2,canvas.height);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=C.cyan;ctx.shadowColor=C.cyan;ctx.shadowBlur=18;ctx.fillRect(p1.x,p1.y,p1.w,p1.h);
      ctx.fillStyle=C.pink;ctx.shadowColor=C.pink;ctx.fillRect(p2.x,p2.y,p2.w,p2.h);
      ctx.fillStyle=C.white;ctx.shadowColor=C.white;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='bold 44px "Press Start 2P"';ctx.textAlign='center';ctx.fillText(p1.score,canvas.width*.28,68);ctx.fillText(p2.score,canvas.width*.72,68);
      ctx.fillStyle=C.cyan;ctx.font='11px Rajdhani';ctx.textAlign='left';ctx.fillText('AI: W/S',14,canvas.height-10);ctx.fillStyle=C.pink;ctx.textAlign='right';ctx.fillText('DU: ↑↓',canvas.width-14,canvas.height-10);
    },16);
  },
  _cleanup(){document.removeEventListener('keydown',this._kd);document.removeEventListener('keyup',this._ku);}
};

// ==================== MEMORY ====================
games.memory = {
  start() {
    canvas.width=480;canvas.height=420;
    const EMOJIS=['🎮','🕹','👾','🚀','⭐','💎','🔥','🌈'];
    let cards=[...EMOJIS,...EMOJIS].sort(()=>Math.random()-.5).map((e,i)=>({emoji:e,id:i,flipped:false,matched:false}));
    let flipped=[],locked=false,score=0,moves=0;
    const COLS=4,ROWS=4,CW=105,CH=95,PAD=8,OX=8,OY=8;

    const draw=()=>{
      ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
      cards.forEach((card,i)=>{
        const c=i%COLS,r=Math.floor(i/COLS),x=OX+c*(CW+PAD),y=OY+r*(CH+PAD);
        if(card.matched){ctx.fillStyle='rgba(57,255,20,.15)';ctx.strokeStyle=C.green;ctx.shadowColor=C.green;ctx.shadowBlur=12;}
        else if(card.flipped){ctx.fillStyle='#1a2a3a';ctx.strokeStyle=C.cyan;ctx.shadowColor=C.cyan;ctx.shadowBlur=10;}
        else{ctx.fillStyle='#1a1a3e';ctx.strokeStyle='#2a2a5a';ctx.shadowBlur=0;}
        ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x,y,CW,CH,8);ctx.fill();ctx.stroke();
        if(card.flipped||card.matched){
          ctx.shadowBlur=0;ctx.font='36px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(card.emoji,x+CW/2,y+CH/2);
        } else {
          ctx.fillStyle=C.cyan;ctx.shadowColor=C.cyan;ctx.shadowBlur=5;ctx.font='bold 20px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',x+CW/2,y+CH/2);
        }
      });
      ctx.shadowBlur=0;ctx.fillStyle=C.yellow;ctx.font='bold 11px "Press Start 2P"';ctx.textAlign='left';ctx.fillText('ZÜGE:'+moves,10,canvas.height-8);
      ctx.fillStyle=C.cyan;ctx.textAlign='right';ctx.fillText('PAARE:'+score+'/8',canvas.width-10,canvas.height-8);
    };

    const osc=document.getElementById('onScreenControls');
    osc.innerHTML='<div style="color:var(--dim);font-size:13px;text-align:center;padding:8px">Klicke oder tippe auf eine Karte!</div>';

    canvas.addEventListener('pointerdown',e=>{
      if(locked)return;
      const r=canvas.getBoundingClientRect();
      const mx=(e.clientX-r.left)*canvas.width/r.width,my=(e.clientY-r.top)*canvas.height/r.height;
      cards.forEach((card,i)=>{
        const c=i%COLS,ri=Math.floor(i/COLS),x=OX+c*(CW+PAD),y=OY+ri*(CH+PAD);
        if(mx>x&&mx<x+CW&&my>y&&my<y+CH&&!card.flipped&&!card.matched){
          card.flipped=true;flipped.push(i);
          if(flipped.length===2){
            moves++;locked=true;
            if(cards[flipped[0]].emoji===cards[flipped[1]].emoji){
              cards[flipped[0]].matched=cards[flipped[1]].matched=true;score++;setScore(score);
              flipped=[];locked=false;if(score===8)gameOver('GEWONNEN! 🎉');
            } else {setTimeout(()=>{cards[flipped[0]].flipped=cards[flipped[1]].flipped=false;flipped=[];locked=false;draw();},900);}
          }draw();
        }
      });
    });
    draw();
  },
  _cleanup(){}
};

// ==================== TIC TAC TOE ====================
games.tictac = {
  start() {
    canvas.width=420;canvas.height=420;
    let board=Array(9).fill(''),player='X',running=true,score=0;

    const win=(b,p)=>{const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return wins.find(([a,b2,c])=>b[a]===p&&b[b2]===p&&b[c]===p)||null;};
    const ai=()=>{
      // minimax simplified
      const avail=board.map((v,i)=>v?null:i).filter(v=>v!==null);
      for(const m of avail){const t=[...board];t[m]='O';if(win(t,'O'))return m;}
      for(const m of avail){const t=[...board];t[m]='X';if(win(t,'X'))return m;}
      if(board[4]==='')return 4;
      const corners=avail.filter(m=>[0,2,6,8].includes(m));if(corners.length)return corners[Math.floor(Math.random()*corners.length)];
      return avail[Math.floor(Math.random()*avail.length)];
    };

    const osc=document.getElementById('onScreenControls');
    osc.innerHTML='<div style="color:var(--dim);font-size:13px;text-align:center;padding:8px">Klicke / tippe auf ein Feld!</div>';

    const G=120,OX=30,OY=30;
    const draw=(winLine)=>{
      ctx.fillStyle='#0a001a';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle=C.purple;ctx.shadowColor=C.purple;ctx.shadowBlur=8;ctx.lineWidth=3;
      [[OX+G,OY,OX+G,OY+G*3],[OX+G*2,OY,OX+G*2,OY+G*3],[OX,OY+G,OX+G*3,OY+G],[OX,OY+G*2,OX+G*3,OY+G*2]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
      board.forEach((v,i)=>{
        const c=i%3,r=Math.floor(i/3),cx=OX+c*G+G/2,cy=OY+r*G+G/2;
        if(v==='X'){ctx.strokeStyle=C.cyan;ctx.shadowColor=C.cyan;ctx.shadowBlur=12;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(cx-28,cy-28);ctx.lineTo(cx+28,cy+28);ctx.moveTo(cx+28,cy-28);ctx.lineTo(cx-28,cy+28);ctx.stroke();}
        if(v==='O'){ctx.strokeStyle=C.pink;ctx.shadowColor=C.pink;ctx.shadowBlur=12;ctx.lineWidth=5;ctx.beginPath();ctx.arc(cx,cy,28,0,Math.PI*2);ctx.stroke();}
      });
      if(winLine){
        const [a,b2,c]=winLine,cx1=OX+(a%3)*G+G/2,cy1=OY+Math.floor(a/3)*G+G/2,cx2=OX+(c%3)*G+G/2,cy2=OY+Math.floor(c/3)*G+G/2;
        ctx.strokeStyle=C.yellow;ctx.shadowColor=C.yellow;ctx.shadowBlur=20;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(cx1,cy1);ctx.lineTo(cx2,cy2);ctx.stroke();
      }
      ctx.shadowBlur=0;ctx.fillStyle=C.dim;ctx.font='12px Rajdhani';ctx.textAlign='center';ctx.fillText('DU = X  |  KI = O',canvas.width/2,canvas.height-12);
      ctx.fillStyle=C.yellow;ctx.font='bold 10px "Press Start 2P"';ctx.fillText('SCORE: '+score,canvas.width/2,22);
    };

    const click=e=>{
      if(!running||player!=='X')return;
      const r=canvas.getBoundingClientRect();
      const mx=(e.clientX-r.left)*canvas.width/r.width-OX,my=(e.clientY-r.top)*canvas.height/r.height-OY;
      const c=Math.floor(mx/G),row=Math.floor(my/G);
      if(c<0||c>2||row<0||row>2)return;
      const idx=row*3+c;if(board[idx])return;
      board[idx]='X';
      const wl=win(board,'X');
      draw(wl);
      if(wl){score++;setScore(score);running=false;return gameOver('DU GEWINNST! 🎉');}
      if(board.every(v=>v)){draw();return gameOver('UNENTSCHIEDEN!');}
      player='O';
      setTimeout(()=>{
        const m=ai();if(m!==undefined)board[m]='O';
        const wl2=win(board,'O');draw(wl2);
        if(wl2){running=false;return gameOver('KI GEWINNT!');}
        if(board.every(v=>v)){draw();return gameOver('UNENTSCHIEDEN!');}
        player='X';
      },400);
    };
    canvas.addEventListener('pointerdown',click);
    draw();
    this._click=click;
  },
  _cleanup(){canvas.removeEventListener('pointerdown',this._click);}
};

// ==================== WHACK-A-MOLE ====================
games.whack = {
  start() {
    canvas.width=480;canvas.height=400;
    const HOLES=[[80,80],[240,60],[400,80],[60,200],[240,180],[420,200],[80,310],[240,290],[400,310]];
    let moles=Array(9).fill(0),score=0,time=30,running=true,frame=0;

    const osc=document.getElementById('onScreenControls');
    osc.innerHTML='<div style="color:var(--dim);font-size:13px;text-align:center;padding:8px">Klicke / tippe auf die Maulwürfe!</div>';

    // Random mole show
    gameLoop=setInterval(()=>{
      if(!running)return;
      frame++;
      // Timer
      if(frame%60===0){time--;if(time<=0){running=false;clearInterval(gameLoop);gameOver('ZEIT! ⏱');}setScore(score);}
      // Randomly add/remove moles
      moles=moles.map(v=>Math.max(0,v-1));
      if(Math.random()<.35){const i=Math.floor(Math.random()*9);if(!moles[i])moles[i]=45+Math.floor(Math.random()*60);}
      draw();
    },16);

    const draw=()=>{
      const gr=ctx.createLinearGradient(0,0,0,canvas.height);gr.addColorStop(0,'#0a2a0a');gr.addColorStop(1,'#051505');ctx.fillStyle=gr;ctx.fillRect(0,0,canvas.width,canvas.height);
      // Grass patches
      for(let i=0;i<12;i++){ctx.fillStyle='rgba(57,255,20,.06)';ctx.beginPath();ctx.ellipse(i*45+20,canvas.height-10,30,12,0,0,Math.PI*2);ctx.fill();}
      HOLES.forEach(([x,y],i)=>{
        ctx.fillStyle='#050f05';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=5;ctx.beginPath();ctx.ellipse(x,y+35,34,16,0,0,Math.PI*2);ctx.fill();
        if(moles[i]>0){
          const pop=Math.min(1,moles[i]/20);
          ctx.save();ctx.beginPath();ctx.ellipse(x,y+35,34,16,0,0,Math.PI*2);ctx.clip();
          ctx.fillStyle='#5a3010';ctx.shadowColor=C.orange;ctx.shadowBlur=10;
          ctx.beginPath();ctx.arc(x,y+35-(pop*50),20,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#7a4520';ctx.beginPath();ctx.arc(x,y+38-(pop*50),16,0,Math.PI,true);ctx.fill();
          ctx.fillStyle=C.white;ctx.shadowBlur=0;ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('🐭',x,y+32-(pop*50));
          ctx.restore();
        }
      });
      ctx.shadowBlur=0;
      ctx.fillStyle=C.yellow;ctx.font='bold 12px "Press Start 2P"';ctx.textAlign='left';ctx.fillText('SCORE: '+score,12,25);
      ctx.fillStyle=time<10?C.pink:C.cyan;ctx.textAlign='right';ctx.fillText('ZEIT: '+time,canvas.width-12,25);
      // Timer bar
      ctx.fillStyle='#1a1a2e';ctx.fillRect(10,35,canvas.width-20,8);
      ctx.fillStyle=time<10?C.pink:C.green;ctx.shadowColor=time<10?C.pink:C.green;ctx.shadowBlur=8;ctx.fillRect(10,35,(canvas.width-20)*(time/30),8);ctx.shadowBlur=0;
    };

    canvas.addEventListener('pointerdown',e=>{
      if(!running)return;
      const r=canvas.getBoundingClientRect();
      const mx=(e.clientX-r.left)*canvas.width/r.width,my=(e.clientY-r.top)*canvas.height/r.height;
      HOLES.forEach(([x,y],i)=>{
        if(moles[i]>0){const dx=mx-x,dy=my-(y+10-(Math.min(1,moles[i]/20)*50));if(Math.sqrt(dx*dx+dy*dy)<28){moles[i]=0;score+=10;setScore(score);}}
      });
    });
  },
  _cleanup(){}
};

// ==================== DODGE BALL ====================
games.dodge = {
  _kd:null,_ku:null,
  start() {
    canvas.width=480;canvas.height=400;
    const GND=canvas.height-20;
    let player={x:240,y:GND-20,r:18,speed:6};
    let balls=[],score=0,frame=0,running=true,spawnRate=80;

    const spawnBall=()=>{
      const colors=[C.pink,C.yellow,C.cyan,C.purple,C.orange,C.green];
      balls.push({x:Math.random()*(canvas.width-40)+20,y:-15,r:10+Math.random()*10,vy:2.5+Math.random()*3,vx:(Math.random()-.5)*2,color:colors[Math.floor(Math.random()*colors.length)]});
    };

    buildDpad({
      left:()=>{holdVKey('ArrowLeft');setTimeout(()=>releaseVKey('ArrowLeft'),100);},
      right:()=>{holdVKey('ArrowRight');setTimeout(()=>releaseVKey('ArrowRight'),100);},
      hideAction:true,
      labelText:'<div class="pad-label">← → Ausweichen</div>'
    });
    makeHoldDpad('ArrowUp','ArrowDown','ArrowLeft','ArrowRight');

    this._kd=e=>heldKeys.add(e.key);this._ku=e=>heldKeys.delete(e.key);
    document.addEventListener('keydown',this._kd);document.addEventListener('keyup',this._ku);

    // Touch drag
    let touchX=null;
    canvas.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
    canvas.addEventListener('touchmove',e=>{
      e.preventDefault();
      const dx=e.touches[0].clientX-touchX;touchX=e.touches[0].clientX;
      player.x=Math.max(player.r,Math.min(canvas.width-player.r,player.x+dx*(canvas.width/canvas.getBoundingClientRect().width)));
    },{passive:false});

    gameLoop=requestAnimationFrame(function loop(){
      if(!running)return;frame++;score++;
      if(frame%300===0)spawnRate=Math.max(20,spawnRate-5);
      if(frame%spawnRate===0)spawnBall();
      setScore(Math.floor(score/10));
      if(isKey('ArrowLeft'))player.x=Math.max(player.r,player.x-player.speed);
      if(isKey('ArrowRight'))player.x=Math.min(canvas.width-player.r,player.x+player.speed);
      balls.forEach(b=>{b.y+=b.vy;b.x+=b.vx;if(b.x<b.r||b.x>canvas.width-b.r)b.vx*=-1;});
      balls=balls.filter(b=>b.y<canvas.height+b.r);
      for(const b of balls){const dx=player.x-b.x,dy=player.y-b.y;if(Math.sqrt(dx*dx+dy*dy)<player.r+b.r-4){running=false;cancelAnimationFrame(gameLoop);gameOver();break;}}

      const gr=ctx.createLinearGradient(0,0,0,canvas.height);gr.addColorStop(0,'#000814');gr.addColorStop(1,'#001428');ctx.fillStyle=gr;ctx.fillRect(0,0,canvas.width,canvas.height);
      for(let i=0;i<50;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*.4})`;ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height*0.7,1,1);}
      ctx.fillStyle=C.green;ctx.shadowColor=C.green;ctx.shadowBlur=6;ctx.fillRect(0,GND,canvas.width,canvas.height-GND);
      balls.forEach(b=>{ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle=C.green;ctx.shadowColor=C.green;ctx.shadowBlur=20;ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=C.white;ctx.shadowBlur=0;ctx.beginPath();ctx.arc(player.x+7,player.y-5,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(player.x+8,player.y-5,2.5,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle=C.cyan;ctx.font='bold 13px "Press Start 2P"';ctx.textAlign='right';ctx.fillText(''+Math.floor(score/10),canvas.width-10,25);
      gameLoop=requestAnimationFrame(loop);
    });
  },
  _cleanup(){document.removeEventListener('keydown',this._kd);document.removeEventListener('keyup',this._ku);}
};

// ==================== COLOR FALL ====================
games.colorfall = {
  _kd:null,
  start() {
    canvas.width=400;canvas.height=420;
    const COLORS=[C.cyan,C.pink,C.yellow,C.green];
    const LABELS=['▲','■','●','♦'];
    const COLS=4,CW=90,PAD=5,OX=5;
    let fallers=[],score=0,speed=2,frame=0,running=true;
    let activeBtn=-1;

    const spawnFaller=()=>{
      const ci=Math.floor(Math.random()*4);
      fallers.push({x:OX+ci*CW+CW/2,y:-20,ci,r:16,vy:speed});
    };

    // Build special controls
    const osc=document.getElementById('onScreenControls');
    osc.innerHTML='';
    const row=document.createElement('div');row.style.cssText='display:flex;gap:6px;justify-content:center;width:100%';
    COLORS.forEach((c,i)=>{
      const btn=document.createElement('div');
      btn.style.cssText=`width:85px;height:68px;border-radius:10px;border:3px solid ${c};background:${c}22;color:${c};font-family:'Press Start 2P',monospace;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;transition:all .1s;box-shadow:0 0 10px ${c}44;`;
      btn.textContent=LABELS[i];
      btn.addEventListener('pointerdown',e=>{e.preventDefault();activeBtn=i;btn.style.background=c;btn.style.color='#000';btn.style.transform='scale(.93)';});
      btn.addEventListener('pointerup',()=>{activeBtn=-1;btn.style.background=c+'22';btn.style.color=c;btn.style.transform='';});
      btn.addEventListener('pointercancel',()=>{activeBtn=-1;btn.style.background=c+'22';btn.style.color=c;btn.style.transform='';});
      row.appendChild(btn);
    });
    osc.appendChild(row);

    this._kd=e=>{const m={1:0,2:1,3:2,4:3};if(m[e.key]!==undefined)activeBtn=m[e.key];};
    const ku=e=>{activeBtn=-1;};
    document.addEventListener('keydown',this._kd);document.addEventListener('keyup',ku);
    this._ku=ku;

    gameLoop=requestAnimationFrame(function loop(){
      if(!running)return;frame++;
      if(frame%300===0)speed=Math.min(7,speed+.3);
      if(frame%50===0)spawnFaller();

      fallers.forEach(f=>{f.y+=f.vy;});

      // Check landing
      for(let i=fallers.length-1;i>=0;i--){
        const f=fallers[i];
        if(f.y>=canvas.height-70){
          if(f.ci===activeBtn){score+=10;setScore(score);fallers.splice(i,1);}
          else{running=false;cancelAnimationFrame(gameLoop);gameOver();return;}
        }
      }

      ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,canvas.width,canvas.height);
      // Lane backgrounds
      for(let i=0;i<COLS;i++){ctx.fillStyle=`${COLORS[i]}08`;ctx.fillRect(OX+i*CW,0,CW-PAD,canvas.height-70);}
      // Lane dividers
      for(let i=1;i<COLS;i++){ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(OX+i*CW-PAD/2,0);ctx.lineTo(OX+i*CW-PAD/2,canvas.height-70);ctx.stroke();}
      // Target zone
      ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(0,canvas.height-70,canvas.width,70);
      ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,canvas.height-70);ctx.lineTo(canvas.width,canvas.height-70);ctx.stroke();

      // Fallers
      fallers.forEach(f=>{
        const pulse=(Math.sin(frame*.1+f.y*.05)+1)/2;
        ctx.fillStyle=COLORS[f.ci];ctx.shadowColor=COLORS[f.ci];ctx.shadowBlur=12+pulse*8;
        ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;ctx.fillStyle='#000';ctx.font=`bold 14px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(LABELS[f.ci],f.x,f.y);
      });

      // Active highlight
      if(activeBtn>=0){
        ctx.fillStyle=`${COLORS[activeBtn]}25`;ctx.strokeStyle=COLORS[activeBtn];ctx.shadowColor=COLORS[activeBtn];ctx.shadowBlur=15;ctx.lineWidth=2;
        ctx.beginPath();ctx.roundRect(OX+activeBtn*CW,canvas.height-70,CW-PAD,70,5);ctx.fill();ctx.stroke();
        ctx.shadowBlur=0;
      }

      ctx.fillStyle=C.cyan;ctx.font='bold 12px "Press Start 2P"';ctx.textAlign='right';ctx.fillText('SCORE:'+score,canvas.width-10,20);
      ctx.fillStyle=C.dim;ctx.font='10px Rajdhani';ctx.textAlign='left';ctx.fillText('Tasten: 1 2 3 4',10,20);
      gameLoop=requestAnimationFrame(loop);
    });
  },
  _cleanup(){document.removeEventListener('keydown',this._kd);document.removeEventListener('keyup',this._ku);}
};
